<svg width="820" height="500" viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif; background: #fafbfd;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a6fa0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#1a3a5c">XChaCha20 Accelerator — Vivado Block Design (Ultra96-V2, Zynq UltraScale+)</text>

  <!-- ============ Zynq PS ============ -->
  <rect x="40" y="210" width="210" height="230" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="145" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">zynq_ultra_ps_e_0</text>
  <text x="145" y="427" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">Zynq UltraScale+ PS</text>

  <!-- PS ports (right side) -->
  <text x="240" y="278" text-anchor="end" font-size="9.5" fill="#2a5a8a" font-weight="500">M_AXI_HPM0_FPD</text>
  <rect x="244" y="270" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <text x="240" y="318" text-anchor="end" font-size="9.5" fill="#2a5a8a" font-weight="500">pl_clk0</text>
  <circle cx="249" cy="315" r="3.5" fill="none" stroke="#3a6fa0" stroke-width="0.8"/>

  <text x="240" y="358" text-anchor="end" font-size="9.5" fill="#2a5a8a" font-weight="500">pl_resetn0</text>
  <circle cx="249" cy="355" r="3.5" fill="none" stroke="#3a6fa0" stroke-width="0.8"/>

  <!-- PS external ports (left side) -->
  <text x="55" y="298" text-anchor="start" font-size="9.5" fill="#2a5a8a" font-weight="500">DDR</text>
  <text x="55" y="338" text-anchor="start" font-size="9.5" fill="#2a5a8a" font-weight="500">FIXED_IO</text>

  <!-- DDR external port (left) -->
  <polygon points="18,290 5,295 18,300" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="0.8"/>
  <line x1="20" y1="295" x2="44" y2="295" stroke="#3a6fa0" stroke-width="1.5"/>

  <!-- FIXED_IO external port (left) -->
  <polygon points="18,330 5,335 18,340" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="0.8"/>
  <line x1="20" y1="335" x2="44" y2="335" stroke="#3a6fa0" stroke-width="1.5"/>

  <!-- ============ Reset Controller ============ -->
  <rect x="300" y="50" width="220" height="150" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="410" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">rst_ps8_0_100M</text>
  <text x="410" y="213" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">Processor System Reset</text>

  <!-- Reset ports (left) -->
  <text x="310" y="100" text-anchor="start" font-size="9" fill="#555">ext_reset_in</text>
  <text x="310" y="118" text-anchor="start" font-size="9" fill="#555">slowest_sync_clk</text>
  <text x="310" y="136" text-anchor="start" font-size="9" fill="#555">dcm_locked</text>

  <!-- Reset ports (right) -->
  <text x="510" y="100" text-anchor="end" font-size="9" fill="#555">peripheral_aresetn[0:0]</text>
  <text x="510" y="118" text-anchor="end" font-size="9" fill="#555">interconnect_aresetn[0:0]</text>
  <text x="510" y="148" text-anchor="end" font-size="9" fill="#555">peripheral_reset[0:0]</text>
  <text x="510" y="166" text-anchor="end" font-size="9" fill="#555">bus_struct_reset[0:0]</text>
  <text x="510" y="184" text-anchor="end" font-size="9" fill="#555">mb_reset</text>

  <!-- ============ AXI SmartConnect ============ -->
  <rect x="340" y="260" width="170" height="100" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="425" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">axi_smc</text>
  <text x="425" y="378" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">AXI SmartConnect</text>

  <!-- SmartConnect ports (left) -->
  <text x="350" y="310" text-anchor="start" font-size="9" fill="#555">S00_AXI</text>
  <rect x="334" y="302" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <!-- SmartConnect ports (right) -->
  <text x="502" y="310" text-anchor="end" font-size="9" fill="#555">M00_AXI</text>
  <rect x="506" y="302" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <!-- SmartConnect bottom ports -->
  <text x="350" y="342" text-anchor="start" font-size="9" fill="#555">aclk</text>
  <text x="502" y="342" text-anchor="end" font-size="9" fill="#555">aresetn</text>

  <!-- ============ XChaCha20 IP ============ -->
  <rect x="600" y="245" width="185" height="135" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="692" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">xcc_mmio_axi4_lite_0</text>
  <text x="692" y="395" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">xcc_mmio_axi4_lite (Pre-Production)</text>

  <!-- XCC ports (left side) -->
  <text x="612" y="300" text-anchor="start" font-size="9" fill="#555">S_AXI</text>
  <rect x="594" y="292" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <text x="612" y="332" text-anchor="start" font-size="9" fill="#555">s_axi_aresetn</text>
  <text x="612" y="355" text-anchor="start" font-size="9" fill="#555">s_axi_aclk</text>

  <!-- ============ Connections ============ -->

  <!-- 1. PS M_AXI → SmartConnect S00_AXI (AXI bus, thick blue) -->
  <line x1="252" y1="274" x2="334" y2="306" stroke="#3a6fa0" stroke-width="2.5"/>

  <!-- 2. SmartConnect M00_AXI → XCC S_AXI (AXI bus, thick blue) -->
  <line x1="514" y1="306" x2="594" y2="296" stroke="#3a6fa0" stroke-width="2.5"/>

  <!-- 3. PS pl_clk0 → route down and right under blocks → up to SmartConnect aclk -->
  <path d="M253 315 L275 315 L275 455 L360 455 L360 345" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 4. PS pl_clk0 → route down and right under blocks → up to XCC s_axi_aclk -->
  <path d="M275 455 L588 455 L588 352 L600 352" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 5. PS pl_resetn0 → route up to Reset ext_reset_in -->
  <path d="M253 355 L270 355 L270 97 L300 97" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 6. Reset peripheral_aresetn → route down right side → SmartConnect aresetn -->
  <path d="M520 97 L550 97 L550 240 L490 240 L490 345" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 7. Reset peripheral_aresetn → route to XCC s_axi_aresetn -->
  <path d="M550 240 L572 240 L572 329 L600 329" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ============ Address annotation ============ -->
  <rect x="180" y="470" width="460" height="24" rx="5" fill="#fff8e0" stroke="#d4a843" stroke-width="0.8"/>
  <text x="410" y="487" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6b4c10">Base: 0xA0000000 · 64 regs × 32-bit · 8-bit addr width · AXI4-Lite</text>
</svg>
