<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif; background: #fafbfd;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a6fa0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#1a3a5c">XChaCha20 Accelerator — Vivado Block Design (Ultra96-V2, Zynq UltraScale+)</text>

  <!-- ============ Zynq PS ============ -->
  <rect x="30" y="200" width="200" height="220" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="130" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">zynq_ultra_ps_e_0</text>

  <!-- PS ports (right side) -->
  <text x="220" y="270" text-anchor="end" font-size="9.5" fill="#2a5a8a" font-weight="500">M_AXI_HPM0_FPD</text>
  <rect x="224" y="262" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <text x="220" y="310" text-anchor="end" font-size="9.5" fill="#2a5a8a" font-weight="500">pl_clk0</text>
  <circle cx="228" cy="307" r="3.5" fill="none" stroke="#3a6fa0" stroke-width="0.8"/>

  <text x="220" y="350" text-anchor="end" font-size="9.5" fill="#2a5a8a" font-weight="500">pl_resetn0</text>
  <circle cx="228" cy="347" r="3.5" fill="none" stroke="#3a6fa0" stroke-width="0.8"/>

  <!-- PS external ports (left side) -->
  <text x="40" y="290" text-anchor="start" font-size="9.5" fill="#2a5a8a" font-weight="500">DDR</text>
  <text x="40" y="330" text-anchor="start" font-size="9.5" fill="#2a5a8a" font-weight="500">FIXED_IO</text>

  <!-- PS label -->
  <text x="130" y="407" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">Zynq UltraScale+ PS</text>

  <!-- DDR / FIXED_IO external ports -->
  <polygon points="730,280 755,286 730,292" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="0.8"/>
  <text x="763" y="290" text-anchor="start" font-size="10" font-weight="500" fill="#2a5a8a">DDR</text>
  <line x1="36" y1="286" x2="728" y2="286" stroke="#3a6fa0" stroke-width="1.5"/>

  <polygon points="730,320 755,326 730,332" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="0.8"/>
  <text x="763" y="330" text-anchor="start" font-size="10" font-weight="500" fill="#2a5a8a">FIXED_IO</text>
  <line x1="36" y1="326" x2="728" y2="326" stroke="#3a6fa0" stroke-width="1.5"/>

  <!-- ============ Reset Controller ============ -->
  <rect x="280" y="52" width="220" height="148" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="390" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">rst_ps8_0_100M</text>

  <!-- Reset ports (left) -->
  <text x="290" y="100" text-anchor="start" font-size="9" fill="#555">ext_reset_in</text>
  <text x="290" y="118" text-anchor="start" font-size="9" fill="#555">slowest_sync_clk</text>
  <text x="290" y="136" text-anchor="start" font-size="9" fill="#555">dcm_locked</text>

  <!-- Reset ports (right) -->
  <text x="490" y="100" text-anchor="end" font-size="9" fill="#555">peripheral_aresetn[0:0]</text>
  <text x="490" y="118" text-anchor="end" font-size="9" fill="#555">interconnect_aresetn[0:0]</text>
  <text x="490" y="148" text-anchor="end" font-size="9" fill="#555">peripheral_reset[0:0]</text>
  <text x="490" y="166" text-anchor="end" font-size="9" fill="#555">bus_struct_reset[0:0]</text>
  <text x="490" y="184" text-anchor="end" font-size="9" fill="#555">mb_reset</text>

  <!-- Reset label -->
  <text x="390" y="212" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">Processor System Reset</text>

  <!-- ============ AXI SmartConnect ============ -->
  <rect x="310" y="250" width="170" height="100" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="395" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">axi_smc</text>

  <!-- SmartConnect ports -->
  <text x="318" y="300" text-anchor="start" font-size="9" fill="#555">S00_AXI</text>
  <rect x="304" y="292" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <text x="472" y="300" text-anchor="end" font-size="9" fill="#555">M00_AXI</text>
  <rect x="476" y="292" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <text x="318" y="330" text-anchor="start" font-size="9" fill="#555">aclk</text>
  <text x="472" y="330" text-anchor="end" font-size="9" fill="#555">aresetn</text>

  <!-- SmartConnect label -->
  <text x="395" y="368" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">AXI SmartConnect</text>

  <!-- ============ XChaCha20 IP ============ -->
  <rect x="570" y="235" width="180" height="130" rx="6" fill="#e8f0f8" stroke="#7ba3c9" stroke-width="1.2"/>
  <text x="660" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#1a3a5c">xcc_mmio_axi4_lite_0</text>

  <!-- XCC ports (left side) -->
  <text x="580" y="290" text-anchor="start" font-size="9" fill="#555">S_AXI</text>
  <rect x="564" y="282" width="8" height="8" rx="1" fill="#7ba3c9" stroke="#3a6fa0" stroke-width="0.6"/>

  <text x="580" y="320" text-anchor="start" font-size="9" fill="#555">s_axi_aresetn</text>
  <text x="580" y="340" text-anchor="start" font-size="9" fill="#555">s_axi_aclk</text>

  <!-- XCC label -->
  <text x="660" y="380" text-anchor="middle" font-size="10" fill="#3a6fa0" font-style="italic">xcc_mmio_axi4_lite (Pre-Production)</text>

  <!-- ============ Connections ============ -->
  <!-- PS M_AXI → SmartConnect S00_AXI (AXI bus — thick blue) -->
  <line x1="232" y1="266" x2="304" y2="296" stroke="#3a6fa0" stroke-width="2.5"/>

  <!-- SmartConnect M00_AXI → XCC S_AXI (AXI bus — thick blue) -->
  <line x1="484" y1="296" x2="564" y2="286" stroke="#3a6fa0" stroke-width="2.5"/>

  <!-- PS pl_clk0 → SmartConnect aclk -->
  <path d="M231 307 L260 307 L260 327 L310 327" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- PS pl_clk0 → XCC s_axi_aclk -->
  <path d="M260 307 L260 440 L560 440 L560 337 L570 337" fill="none" stroke="#3a6fa0" stroke-width="1"/>

  <!-- PS pl_resetn0 → Reset ext_reset_in -->
  <path d="M231 347 L250 347 L250 97 L280 97" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Reset peripheral_aresetn → SmartConnect aresetn -->
  <path d="M500 97 L530 97 L530 230 L470 230 L470 327" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Reset peripheral_aresetn → XCC s_axi_aresetn -->
  <path d="M530 230 L540 230 L540 317 L570 317" fill="none" stroke="#3a6fa0" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ============ Address annotation ============ -->
  <rect x="150" y="440" width="500" height="28" rx="5" fill="#fff8e0" stroke="#d4a843" stroke-width="0.8"/>
  <text x="400" y="459" text-anchor="middle" font-size="11" font-weight="500" fill="#6b4c10">Base: 0xA0000000 · 64 registers × 32-bit · 8-bit addr width · AXI4-Lite</text>
</svg>